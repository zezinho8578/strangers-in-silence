<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LambdaOS - Node Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505; 
            color: #ff9900; 
            font-family: 'VT323', monospace;
            font-size: 22px; /* Made text a bit smaller */
            margin: 0;
            padding: 15px; /* Brought closer to top left */
            overflow-x: hidden;
            text-shadow: 0 0 5px rgba(255, 153, 0, 0.6);
        }

        /* Subtle CRT scanline overlay */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* Faded Orange Lambda Background */
        #bg-lambda {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            opacity: 0.08; 
            z-index: -1;
            pointer-events: none;
        }

        #terminal {
            white-space: pre-wrap;
            line-height: 1.2;
            word-wrap: break-word;
        }

        .highlight {
            background-color: #ff9900;
            color: #000;
            text-shadow: none;
            padding: 0 6px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: #ff9900;
            animation: blink 1s step-end infinite;
            vertical-align: bottom;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <!-- Faded Lambda Background -->
    <img id="bg-lambda" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Orange_lambda.svg/1280px-Orange_lambda.svg.png" alt="Lambda Logo">

    <!-- The terminal is now split into finalized history and the active input line -->
    <div id="terminal"><span id="history"></span><span id="active-line"></span><span class="cursor" id="cursor"></span></div>

    <!-- Audio Elements -->
    <audio id="audio-boot" src="boot.mp3"></audio>
    <audio id="audio-error" src="error.mp3"></audio>

    <script>
        // --- GAME DATA ---
        const accounts = ["Katey Commons", "Trombley Hicks", "Vesa Novik", "Administrator"];
        
        const passwords = {
            "Katey Commons": "katey123",
            "Trombley Hicks": "hicks123",
            "Vesa Novik": "vesa123",
            "Administrator": "admin"
        };

        // --- TERMINAL STATE ---
        let currentMode = "uninitialized"; 
        let selectedIndex = 0;
        let typedPassword = "";
        
        // DOM Elements
        const historyEl = document.getElementById('history');
        const activeLineEl = document.getElementById('active-line');
        const audioBoot = document.getElementById('audio-boot');
        const audioError = document.getElementById('audio-error');

        const bootText = [
            "LambdaOS v.2.1.4 (Build 8472)",
            "Checking memory... OK (640K Base / 15360K Extended)",
            "Mounting file systems... OK",
            "Initializing Overwatch Bypass Protocol... SUCCESS",
            "Establishing connection to Resistance Node...",
            "DONE.\n"
        ];

        // --- AUTO START ---
        window.onload = () => {
            // Attempt to play audio (may be blocked by browser until user presses a key)
            audioBoot.volume = 0.5;
            audioBoot.play().catch(e => console.log("Autoplay blocked pending user interaction."));
            runBootSequence();
        };

        // Smooth scrolling function
        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // --- BOOT ANIMATION ---
        async function runBootSequence() {
            currentMode = "booting";
            
            for (let line of bootText) {
                await typeLine("> " + line);
                await sleep(300); // Pause between lines
            }
            
            renderAccountSelection();
        }

        function typeLine(text) {
            return new Promise(resolve => {
                let i = 0;
                // Add a newline if history isn't empty
                if (historyEl.innerHTML !== "") historyEl.innerHTML += "\n";
                
                let interval = setInterval(() => {
                    historyEl.innerHTML += text.charAt(i);
                    scrollToBottom();
                    i++;
                    if (i >= text.length) {
                        clearInterval(interval);
                        resolve();
                    }
                }, 15); // Typing speed
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // --- COMMIT ACTIVE LINE TO HISTORY ---
        // Moves the current active line text into the permanent history above it
        function commitActiveLine() {
            if (historyEl.innerHTML !== "") historyEl.innerHTML += "\n";
            historyEl.innerHTML += activeLineEl.innerHTML;
            activeLineEl.innerHTML = "";
            scrollToBottom();
        }

        // --- ACCOUNT SELECTION UI ---
        function renderAccountSelection() {
            currentMode = "selecting";
            
            let selectionString = "> SELECT ACCOUNT: ";
            
            accounts.forEach((acc, index) => {
                if (index === selectedIndex) {
                    selectionString += `<span class="highlight">${acc}</span>`;
                } else {
                    selectionString += acc;
                }
                
                if (index < accounts.length - 1) {
                    selectionString += " / ";
                }
            });

            // Update in place (does not create a new line)
            activeLineEl.innerHTML = selectionString;
            scrollToBottom();
        }

        // --- PASSWORD UI ---
        function renderPasswordPrompt() {
            // Mask password with asterisks
            let maskedStr = "*".repeat(typedPassword.length);
            activeLineEl.innerHTML = "> PASSWORD: " + maskedStr;
            scrollToBottom();
        }

        // --- KEYBOARD CONTROLS ---
        document.addEventListener('keydown', async (e) => {
            // Wake up audio context on first keypress if it was blocked
            if (audioBoot.paused && currentMode === "booting") {
                audioBoot.play().catch(()=>{});
            }

            if (currentMode === "selecting") {
                if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
                    selectedIndex = (selectedIndex > 0) ? selectedIndex - 1 : accounts.length - 1;
                    renderAccountSelection();
                } 
                else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
                    selectedIndex = (selectedIndex < accounts.length - 1) ? selectedIndex + 1 : 0;
                    renderAccountSelection();
                }
                else if (e.key === "Enter") {
                    commitActiveLine(); // Lock in the choice
                    currentMode = "password";
                    typedPassword = "";
                    renderPasswordPrompt();
                }
            } 
            else if (currentMode === "password") {
                if (e.key === "Enter") {
                    let selectedAccount = accounts[selectedIndex];
                    let correctPassword = passwords[selectedAccount];

                    if (typedPassword === correctPassword) {
                        commitActiveLine();
                        currentMode = "loading";
                        await typeLine("> ACCESS GRANTED. WELCOME.");
                        await typeLine("> INITIALIZING DASHBOARD...");
                        
                        setTimeout(() => {
                            window.location.href = "dashboard.html"; 
                        }, 2000);

                    } else {
                        // Wrong Password
                        audioError.currentTime = 0;
                        audioError.play().catch(e => console.log("Error audio not found."));
                        
                        commitActiveLine();
                        await typeLine("> ACCESS DENIED. TRY AGAIN.");
                        
                        // Restart password prompt
                        typedPassword = "";
                        renderPasswordPrompt();
                    }
                } 
                else if (e.key === "Backspace") {
                    typedPassword = typedPassword.slice(0, -1);
                    renderPasswordPrompt();
                }
                else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) { 
                    // Normal character typing
                    typedPassword += e.key;
                    renderPasswordPrompt();
                }
            }
        });
    </script>
</body>
</html>
