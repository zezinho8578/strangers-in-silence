<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LambdaOS - Node Terminal</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- CHECK FOR PERSISTENT LOGIN INSTANTLY -->
    <script>
        if (localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser')) {
            window.location.replace("dashboard.html");
        }
    </script>
</head>
<body>

    <img id="bg-lambda" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Orange_lambda.svg/1280px-Orange_lambda.svg.png" alt="Lambda Logo">

    <div id="start-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #000; z-index: 10; cursor: pointer; animation: pulse 2s infinite; font-size: 26px;">
        [ CLICK TO INITIALIZE TERMINAL ]
    </div>

    <!-- Terminal Structure -->
    <div id="terminal" style="display:none;">
        <div id="output-history"></div>
        <div><span id="input-line"></span><span class="cursor" id="cursor"></span></div>
    </div>

    <!-- Audio Elements -->
    <audio id="audio-boot" src="boot.mp3"></audio>
    <audio id="audio-error" src="error.mp3"></audio>

    <script src="settings.js"></script>
    <script>
        // --- GAME DATA ---
        const accounts = ["Katey Commons", "Trombley Hicks", "Vesa Novik", "Administrator"];
        const passwords = {
            "Katey Commons": "katey123",
            "Trombley Hicks": "hicks123",
            "Vesa Novik": "vesa123",
            "Administrator": "admin"
        };

        // --- TERMINAL STATE ---
        let currentMode = "uninitialized"; 
        let selectedIndex = 0;
        let typedPassword = "";
        
        const startScreen = document.getElementById('start-screen');
        const terminal = document.getElementById('terminal');
        const outputHistory = document.getElementById('output-history');
        const inputLine = document.getElementById('input-line');
        const audioBoot = document.getElementById('audio-boot');
        const audioError = document.getElementById('audio-error');

        const bootText = [
            "LambdaOS v.2.1.4 (Build 8472)",
            "Checking memory... OK (640K Base / 15360K Extended)",
            "Mounting file systems... OK",
            "Initializing Overwatch Bypass Protocol... SUCCESS",
            "Establishing connection to Resistance Node...",
            "DONE.",
            "" 
        ];

        function scrollToBottom() { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }

        function playSound(audioElement) {
            if (localStorage.getItem('lambdaAudio') !== 'off') {
                audioElement.currentTime = 0;
                audioElement.play().catch(e => console.log("Audio not found/blocked."));
            }
        }

        startScreen.addEventListener('click', () => {
            startScreen.style.display = 'none';
            terminal.style.display = 'block';
            audioBoot.volume = 0.5;
            playSound(audioBoot);
            runBootSequence();
        });

        async function runBootSequence() {
            currentMode = "booting";
            for (let line of bootText) {
                if (line === "") {
                    inputLine.innerHTML = "";
                    finalizeInput();
                } else {
                    await typeLine("> " + line);
                    finalizeInput(); 
                    await sleep(300); 
                }
            }
            renderAccountSelection();
        }

        function typeLine(text) {
            return new Promise(resolve => {
                let i = 0;
                inputLine.innerHTML = "";
                let interval = setInterval(() => {
                    inputLine.textContent += text.charAt(i);
                    scrollToBottom();
                    i++;
                    if (i >= text.length) {
                        clearInterval(interval);
                        resolve();
                    }
                }, 20); 
            });
        }

        function finalizeInput() {
            const div = document.createElement('div');
            div.innerHTML = inputLine.innerHTML || "<br>"; 
            outputHistory.appendChild(div);
            inputLine.innerHTML = "";
            scrollToBottom();
        }

        function finalizeRawText(text) {
            const div = document.createElement('div');
            div.innerHTML = text;
            outputHistory.appendChild(div);
            scrollToBottom();
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        function renderAccountSelection() {
            currentMode = "selecting";
            let selectionString = "> SELECT ACCOUNT: ";
            accounts.forEach((acc, index) => {
                if (index === selectedIndex) {
                    selectionString += `<span class="highlight">${acc}</span>`;
                } else {
                    selectionString += acc;
                }
                if (index < accounts.length - 1) selectionString += " / ";
            });
            inputLine.innerHTML = selectionString; 
            scrollToBottom();
        }

        function renderPasswordPrompt() {
            let maskedStr = "*".repeat(typedPassword.length);
            inputLine.innerHTML = `> PASSWORD: ${maskedStr}`;
            scrollToBottom();
        }

        document.addEventListener('keydown', (e) => {
            if (currentMode === "selecting") {
                if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) e.preventDefault(); 

                if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
                    selectedIndex = (selectedIndex > 0) ? selectedIndex - 1 : accounts.length - 1;
                    renderAccountSelection();
                } 
                else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
                    selectedIndex = (selectedIndex < accounts.length - 1) ? selectedIndex + 1 : 0;
                    renderAccountSelection();
                }
                else if (e.key === "Enter") {
                    finalizeInput(); 
                    currentMode = "password";
                    typedPassword = ""; 
                    renderPasswordPrompt(); 
                }
            } 
            else if (currentMode === "password") {
                if (e.key === "Enter") {
                    let selectedAccount = accounts[selectedIndex];
                    let correctPassword = passwords[selectedAccount];
                    finalizeInput(); 

                    if (typedPassword === correctPassword) {
                        currentMode = "loading";
                        sessionStorage.setItem('currentUser', selectedAccount);
                        finalizeRawText("> ACCESS GRANTED. WELCOME.");
                        finalizeRawText("> INITIALIZING DASHBOARD...");
                        
                        setTimeout(() => { window.location.href = "dashboard.html"; }, 2000);
                    } else {
                        playSound(audioError);
                        finalizeRawText("> ACCESS DENIED. TRY AGAIN.");
                        typedPassword = ""; 
                        renderPasswordPrompt();
                    }
                } 
                else if (e.key === "Backspace") {
                    typedPassword = typedPassword.slice(0, -1);
                    renderPasswordPrompt();
                }
                else if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) { 
                    typedPassword += e.key;
                    renderPasswordPrompt();
                }
            }
        });
    </script>
</body>
</html>
